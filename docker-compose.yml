services:
  nothing-to-do:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # bind to localhost; put nginx in front for HTTPS
    volumes:
      - ntd-data:/data
    environment:
      NODE_ENV: production
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET must be set in .env}"
      PORT: "3000"
      HOST: "0.0.0.0"
      DB_PATH: "/data/tasks.db"
      LOG_LEVEL: "info"

volumes:
  ntd-data:
