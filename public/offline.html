<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1F6B3B">
    <title>Offline — nothing-to-do</title>
    <style>
        :root {
            --paper: #F1EDE2;
            --ink: #23291F;
            --ink-soft: #4E5345;
            --forest: #1F6B3B;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --paper: #10140E;
                --ink: #E8EADF;
                --ink-soft: #A7AC99;
                --forest: #57A972;
            }
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 1rem; min-height: 100dvh; padding: 1.5rem;
            background: var(--paper); color: var(--ink);
            font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            text-align: center;
        }
        svg { color: var(--forest); }
        h1 { margin: 0; font-size: 1.375rem; font-weight: 500; letter-spacing: -0.01em; }
        p { margin: 0; max-width: 26rem; color: var(--ink-soft); line-height: 1.6; }
        button {
            margin-top: 0.5rem; padding: 0.625rem 1.25rem; border: none; border-radius: 0.625rem;
            background: var(--forest); color: #fff; font: inherit; font-weight: 500; font-size: 0.875rem;
            cursor: pointer;
        }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 3.75 20.5 19.5 3.5 19.5 Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
    </svg>
    <h1>Kurz keine Verbindung.</h1>
    <p>nothing-to-do braucht gerade eine Verbindung zum Server. Sobald du wieder online bist, geht's automatisch weiter.</p>
    <button type="button" onclick="location.reload()">Erneut versuchen</button>
</body>
</html>
