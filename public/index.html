<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="nothing-to-do — your personal task list">
  <title>nothing-to-do</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">

  <!-- ── Login view ─────────────────────────────────────────────────────── -->
  <div id="view-login" class="view-auth hidden">
    <div class="auth-card">
      <h1 class="logo">nothing-to-do</h1>
      <form id="form-login" autocomplete="on">
        <div class="field">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" required autocomplete="username">
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" required autocomplete="current-password">
        </div>
        <div id="login-error" class="error-message hidden"></div>
        <button type="submit" class="btn-primary" id="login-submit">Sign in</button>
      </form>
      <p class="auth-switch">No account? <a href="#" id="goto-register">Register</a></p>
    </div>
  </div>

  <!-- ── Register view ──────────────────────────────────────────────────── -->
  <div id="view-register" class="view-auth hidden">
    <div class="auth-card">
      <h1 class="logo">nothing-to-do</h1>
      <form id="form-register" autocomplete="on">
        <div class="field">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" required autocomplete="username" minlength="2" maxlength="64">
        </div>
        <div class="field">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" required autocomplete="new-password" minlength="8">
        </div>
        <div class="field">
          <label for="reg-confirm">Confirm password</label>
          <input id="reg-confirm" type="password" required autocomplete="new-password">
        </div>
        <div id="register-error" class="error-message hidden"></div>
        <button type="submit" class="btn-primary" id="register-submit">Create account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="#" id="goto-login">Sign in</a></p>
    </div>
  </div>

  <!-- ── Tasks view ─────────────────────────────────────────────────────── -->
  <div id="view-tasks" class="hidden">
    <header class="app-header">
      <span class="app-title">nothing-to-do</span>
      <div class="header-right">
        <span id="header-username" class="header-username"></span>
        <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-logout" class="btn-icon" title="Log out" aria-label="Log out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <!-- Quick-add form -->
      <form id="quick-add" class="quick-add">
        <div class="quick-add-main">
          <input type="text" id="qa-name" placeholder="Add a task…" autocomplete="off" maxlength="256">
          <button type="submit" class="btn-add">Add</button>
        </div>
        <div id="qa-details" class="quick-add-details hidden">
          <textarea id="qa-desc" placeholder="Description (optional)" rows="2" maxlength="4096"></textarea>
          <div class="quick-add-meta">
            <input type="text" id="qa-tags" placeholder="Tags: work, urgent…" maxlength="256">
            <input type="datetime-local" id="qa-deadline">
          </div>
        </div>
      </form>

      <!-- Tag filters (shown only when tasks have tags) -->
      <div id="tag-filters" class="tag-filters hidden"></div>

      <!-- Active task list -->
      <div id="task-list" class="task-list"></div>

      <!-- Completed-today section -->
      <div id="done-section" class="hidden">
        <div class="section-label">Done today</div>
        <div id="done-list" class="task-list"></div>
      </div>
    </main>
  </div>

  <!-- ── Settings view ──────────────────────────────────────────────────── -->
  <div id="view-settings" class="hidden">
    <div class="settings-header">
      <button id="btn-back" class="btn-back">← Back</button>
      <h1>Settings</h1>
    </div>

    <div class="settings-section">
      <h2>API token</h2>
      <p>Use this token to create and manage tasks from Apple Shortcuts or any HTTP client. Keep it secret.</p>
      <div id="token-display-area"></div>
      <div class="settings-actions">
        <button id="btn-gen-token" class="btn-secondary">Generate token</button>
        <button id="btn-revoke-token" class="btn-danger hidden">Revoke token</button>
      </div>
    </div>
  </div>

  <!-- ── Edit task modal ────────────────────────────────────────────────── -->
  <div id="edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-label="Edit task">
    <div class="modal">
      <h2>Edit task</h2>
      <div class="field">
        <label for="edit-name">Name</label>
        <input type="text" id="edit-name" required maxlength="256">
      </div>
      <div class="field">
        <label for="edit-desc">Description</label>
        <textarea id="edit-desc" rows="3" maxlength="4096" placeholder="Optional…"></textarea>
      </div>
      <div class="field">
        <label for="edit-tags">Tags (comma-separated)</label>
        <input type="text" id="edit-tags" maxlength="256" placeholder="work, urgent…">
      </div>
      <div class="field">
        <label for="edit-deadline">Deadline</label>
        <input type="datetime-local" id="edit-deadline">
      </div>
      <div id="edit-error" class="error-message hidden"></div>
      <div class="modal-footer">
        <button type="button" id="edit-cancel" class="btn-secondary">Cancel</button>
        <button type="button" id="edit-save" class="btn-primary" style="width:auto;margin-top:0">Save</button>
      </div>
    </div>
  </div>

</div><!-- #app -->

<script src="/app.js?v=2"></script>
</body>
</html>
